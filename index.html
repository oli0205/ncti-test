<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>NCTI人格测试 - 深度匹配版</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f0f9ff, #e6fffa);
        margin: 0; padding: 0; text-align: center; color: #333;
    }
    .container {
        max-width: 600px; margin: 40px auto; background: white;
        padding: 30px; border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }
    h1 { color: #2d6a4f; margin-bottom: 10px; }
    .progress-box { height: 8px; background: #eee; border-radius: 4px; margin: 20px 0; overflow: hidden; }
    .progress-bar { height: 100%; background: #4caf50; width: 0%; transition: 0.3s; }
    button {
        background: #2d6a4f; color: white; border: none;
        padding: 15px 40px; border-radius: 30px; cursor: pointer;
        font-size: 16px; transition: 0.2s;
    }
    button:hover { transform: scale(1.05); background: #1b4332; }
    .option {
        display: block; margin: 15px 0; padding: 18px;
        background: #f8fdf9; border: 2px solid #eef7ee;
        border-radius: 15px; cursor: pointer; transition: 0.2s;
    }
    .option:hover { border-color: #4caf50; background: #f1f8e9; }
    .hidden { display:none; }
    .dimension-result {
        display: flex; justify-content: space-around; margin: 20px 0;
        font-size: 14px; color: #666;
    }
    .match-score { font-size: 40px; color: #2d6a4f; font-weight: bold; margin: 10px 0; }
    .member-name { font-size: 24px; color: #1b4332; margin-bottom: 20px; }
</style>
</head>

<body>

<div class="container" id="cover">
    <h1>🌿 NCTI 人格测试</h1>
    <p>基于百分制匹配算法，寻找你的本命成员</p>
    <button onclick="startTest()">开始测试</button>
</div>

<div class="container hidden" id="quiz">
    <div class="progress-box"><div class="progress-bar" id="progressBar"></div></div>
    <h2 id="question"></h2>
    <div id="options"></div>
</div>

<div class="container hidden" id="result">
    <h2>匹配结果</h2>
    <div class="match-score" id="matchScore">98%</div>
    <div class="member-name" id="resultText"></div>
    <hr>
    <p>你的维度画像：</p>
    <div id="dimensionDetail"></div>
    <button onclick="location.reload()" style="margin-top:20px">再测一次</button>
</div>

<script>
// 题目数据保持不变
const questions = [
    ["在陌生聚会中，你会？","主动聊天","先观察"], // E/I
    ["冷场时你会？","主动活跃气氛","等待别人"],
    ["社交后你感觉？","更有能量","需要独处"],
    ["你更倾向于？","表达自我","倾听他人"],
    ["遇到新朋友？","很快熟络","需要时间"],
    ["在群体中？","中心位置","边缘安静"],
    ["更像？","外向","内向"],
    
    ["做决定时更依赖？","逻辑","感觉"], // T/F
    ["朋友难过你会？","分析原因给建议","感同身受给安慰"],
    ["你更看重？","事情的合理性","人的舒适感"],
    ["表达情绪？","直接表达事实","内敛含蓄委婉"],
    ["被误解时？","理性解释","沉默或难过"],
    ["更喜欢？","真诚的批评","温柔的鼓励"],
    ["做决定？","理性导向","感性导向"],

    ["工作学习习惯？","提前做计划","随缘灵感驱动"], // J/P
    ["面对突发变化？","感到不适","感到兴奋"],
    ["时间管理？","严格遵守时间","灵活自由安排"],
    ["你的房间？","整洁有序","乱中有序"],
    ["旅行前？","必做攻略","说走就走"],
    ["任务截止前？","尽早完成","死线冲刺"],
    ["生活方式？","有规律","随性"],

    ["沟通风格？","直接干脆","委婉保留"], // X/R (这里假设X是主导/直接，R是配合/内敛)
    ["压力大时？","找人倾诉","自我消化"],
    ["团队合作中？","倾向主导","倾向配合"],
    ["遇到冲突？","正面解决","回避矛盾"],
    ["分享欲？","很强","一般"],
    ["氛围？","制造者","观察者"],
    ["行动节奏？","快节奏","慢节奏"]
];

// 定义成员的人格坐标 (0代表后一个字母，1代表前一个字母)
// 例如：ETPJ = {E:1, T:1, J:1, X:1}
// 为了更准，我们可以给成员设定具体的百分比分值（0~1之间）
const members = [
    // NCT 127
    { name: "🐱 Johnny", traits: { EI: 0.9, TF: 0.8, JP: 0.4, XR: 0.9 }, desc: "自信幽默的社交达人，拥有掌控全场的气场。" },
    { name: "🌹 Taeyong", traits: { EI: 0.3, TF: 0.3, JP: 0.9, XR: 0.8 }, desc: "感性且极致努力的领导者，内心柔软但做事严谨。" },
    { name: "🐙 Yuta", traits: { EI: 0.7, TF: 0.6, JP: 0.3, XR: 0.8 }, desc: "直率热烈的行动派，有着独特的个人世界观。" },
    { name: "🐰 Doyoung", traits: { EI: 0.4, TF: 0.9, JP: 0.95, XR: 0.7 }, desc: "逻辑满分、生活极其规律的模范生，值得信赖。" },
    { name: "🍑 Jaehyun", traits: { EI: 0.4, TF: 0.7, JP: 0.5, XR: 0.5 }, desc: "优雅且沉稳，平衡感极佳，冷静中透着理性。" },
    { name: "🐶 Jungwoo", traits: { EI: 0.8, TF: 0.2, JP: 0.4, XR: 0.4 }, desc: "共情能力超强的氛围制造者，敏感又可爱的存在。" },
    { name: "🐻 Haechan", traits: { EI: 0.9, TF: 0.7, JP: 0.3, XR: 0.8 }, desc: "大脑转速极快的机智派，社交场上的绝对主角。" },

    // NCT DREAM
    { name: "🦊 Renjun", traits: { EI: 0.4, TF: 0.5, JP: 0.8, XR: 0.6 }, desc: "细腻且清醒，艺术感十足，在规则与自由间寻找平衡。" },
    { name: "🐶 Jeno", traits: { EI: 0.3, TF: 0.8, JP: 0.8, XR: 0.5 }, desc: "温和冷静的稳定器，有着像萨摩耶一样可靠的逻辑感。" },
    { name: "🐰 Jaemin", traits: { EI: 0.3, TF: 0.6, JP: 0.2, XR: 0.7 }, desc: "拥有独特边界感的自由灵魂，爱与理智并存。" },
    { name: "🐬 Chenle", traits: { EI: 0.8, TF: 0.9, JP: 0.4, XR: 0.9 }, desc: "通透且自信，逻辑思维极强，活得非常自在。" },
    { name: "🐹 Jisung", traits: { EI: 0.1, TF: 0.4, JP: 0.3, XR: 0.2 }, desc: "纯粹且含蓄的观察者，内心世界丰富且一直在成长。" },

    // WayV
    { name: "🐻 Kun", traits: { EI: 0.5, TF: 0.8, JP: 0.9, XR: 0.8 }, desc: "全能且靠谱的家长级人物，条理清晰，执行力满分。" },
    { name: "🐱 Ten", traits: { EI: 0.6, TF: 0.4, JP: 0.5, XR: 0.8 }, desc: "自由不羁的艺术家，追求极致的自我表达与突破。" },
    { name: "🐥 Winwin", traits: { EI: 0.2, TF: 0.4, JP: 0.4, XR: 0.3 }, desc: "温润如玉，低调内敛，拥有强大的内心平衡力。" },
    { name: "🦕 Xiaojun", traits: { EI: 0.4, TF: 0.2, JP: 0.7, XR: 0.5 }, desc: "感性且真挚，情感表达丰富，是个深情的完美主义者。" },
    { name: "🐴 Hendery", traits: { EI: 0.7, TF: 0.6, JP: 0.3, XR: 0.6 }, desc: "脑洞大开的快乐源泉，思维跳跃且心态豁达。" },
    { name: "🐑 Yangyang", traits: { EI: 0.7, TF: 0.7, JP: 0.5, XR: 0.7 }, desc: "机灵且充满活力的冒险者，沟通直接且极具逻辑。" },

    // NCT WISH
    { name: "🌷 Sion", traits: { EI: 0.5, TF: 0.6, JP: 0.8, XR: 0.7 }, desc: "稳重且周全的年轻队长，在责任与活力间平衡。" },
    { name: "🐿️ Riku", traits: { EI: 0.3, TF: 0.7, JP: 0.6, XR: 0.5 }, desc: "外冷内热，做事利落，有着超越年龄的沉稳感。" },
    { name: "⭐️ Yushi", traits: { EI: 0.2, TF: 0.5, JP: 0.5, XR: 0.4 }, desc: "话少但专注的努力派，沉浸在自己的艺术世界中。" },
    { name: "🌳 Jaehee", traits: { EI: 0.6, TF: 0.4, JP: 0.4, XR: 0.5 }, desc: "温暖的阳光少年，共情力强，能给人带来治愈。" },
    { name: "🦭 Ryo", traits: { EI: 0.7, TF: 0.5, JP: 0.7, XR: 0.6 }, desc: "充满活力且执行力强，对世界充满好奇心。" },
    { name: "🥐 Sakuya", traits: { EI: 0.4, TF: 0.4, JP: 0.2, XR: 0.4 }, desc: "拥有奇妙魅力的忙内，古灵精怪且充满灵性。" }
];

let index = 0;
let rawScores = { EI: 0, TF: 0, JP: 0, XR: 0 };

function startTest() {
    document.getElementById("cover").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    showQuestion();
}

function showQuestion() {
    let q = questions[index];
    document.getElementById("question").innerText = q[0];
    let html = `
        <div class="option" onclick="answer(1)">${q[1]}</div>
        <div class="option" onclick="answer(0)">${q[2]}</div>
    `;
    document.getElementById("options").innerHTML = html;
    document.getElementById("progressBar").style.width = (index / questions.length * 100) + "%";
}

function answer(val) {
    if (index < 7) rawScores.EI += val;
    else if (index < 14) rawScores.TF += val;
    else if (index < 21) rawScores.JP += val;
    else rawScores.XR += val;

    index++;
    if (index < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    // 计算用户百分比 (0.0 ~ 1.0)
    const userTraits = {
        EI: rawScores.EI / 7,
        TF: rawScores.TF / 7,
        JP: rawScores.JP / 7,
        XR: rawScores.XR / 7
    };

    let bestMatch = null;
    let maxSimilarity = -1;

    // 匹配算法：欧几里得距离的变体 (计算相似度)
    members.forEach(member => {
        let distance = Math.sqrt(
            Math.pow(userTraits.EI - member.traits.EI, 2) +
            Math.pow(userTraits.TF - member.traits.TF, 2) +
            Math.pow(userTraits.JP - member.traits.JP, 2) +
            Math.pow(userTraits.XR - member.traits.XR, 2)
        );
        
        // 将距离转换为百分比相似度 (距离越小，相似度越高)
        // 4个维度最大距离是 2 (Math.sqrt(1^2 * 4))
        let similarity = (1 - (distance / 2)) * 100;
        
        if (similarity > maxSimilarity) {
            maxSimilarity = similarity;
            bestMatch = { ...member, similarity: similarity.toFixed(1) };
        }
    });

    // 显示结果
    document.getElementById("matchScore").innerText = bestMatch.similarity + "%";
    document.getElementById("resultText").innerHTML = `<strong>${bestMatch.name}</strong><br><small>${bestMatch.desc}</small>`;
    
    // 显示维度详情
    document.getElementById("dimensionDetail").innerHTML = `
        <div class="dimension-result">
            <span>外向 E ${Math.round(userTraits.EI*100)}%</span>
            <span>理性 T ${Math.round(userTraits.TF*100)}%</span>
            <span>计划 J ${Math.round(userTraits.JP*100)}%</span>
            <span>主导 X ${Math.round(userTraits.XR*100)}%</span>
        </div>
    `;
}
</script>

</body>
</html>
